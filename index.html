<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Reset Emocional · Kamila Bonatto</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<script>
// ── URL DO APPS SCRIPT — cole aqui após publicar ────────
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwgQXU-Zh2dSgNsrFCaiTI5B7zP31CAxH19z3SIrsOa7d55IXr8dMrP-PQMltj2ehc/exec";

// ── CACHE DE RANKING DA COMUNIDADE ──────────────────────
// { "Corpo": [{acao, media, vezes, emocao}, ...], "Segurança": [...], ... }
let rankingComunidade = {};

async function carregarRanking(necessidade) {
  const token = sessionStorage.getItem("re-token");
  if (!token || !necessidade || APPS_SCRIPT_URL.startsWith("COLE")) return;
  try {
    const url = `${APPS_SCRIPT_URL}?acao=ranking&necessidade=${encodeURIComponent(necessidade)}&token=${encodeURIComponent(token)}`;
    const res  = await fetch(url);
    const json = await res.json();
    if (json.ok && json.dados) {
      rankingComunidade[necessidade] = json.dados;
    }
  } catch(_) {}
}

// ── PROTEÇÃO POR TOKEN (via Apps Script) ────────────────
(function verificarAcesso() {
  const sessao = sessionStorage.getItem("re-auth");
  if (sessao === "ok") return;

  document.addEventListener("DOMContentLoaded", function () {
    document.body.innerHTML = `
      <div id="bloqueio" style="
        min-height:100vh;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        text-align:center;
        padding:40px 24px;
        font-family:'Poppins',sans-serif;
        background: linear-gradient(to right, #0a0a0a 0%, #1a1a1a 30%, #2e2e2e 60%, #4a4040 100%);
        color:#F4EDE0;
        position:relative;
        overflow:hidden;
      ">
        <div style="position:absolute;inset:0;background-image:url('data:image/svg+xml,%3Csvg viewBox=\\'0 0 256 256\\' xmlns=\\'http://www.w3.org/2000/svg\\'%3E%3Cfilter id=\\'noise\\'%3E%3CfeTurbulence type=\\'fractalNoise\\' baseFrequency=\\'0.9\\' numOctaves=\\'4\\' stitchTiles=\\'stitch\\'/%3E%3C/filter%3E%3Crect width=\\'100%25\\' height=\\'100%25\\' filter=\\'url(%23noise)\\' opacity=\\'0.04\\'/%3E%3C/svg%3E');pointer-events:none;opacity:0.5;"></div>

        <p style="font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#E8601A;font-weight:500;margin-bottom:20px;position:relative;z-index:1;">
          Acesso exclusivo
        </p>
        <h1 style="font-family:'Lora',serif;font-size:clamp(32px,7vw,48px);font-weight:400;line-height:1.15;max-width:380px;margin-bottom:8px;color:#ffffff;position:relative;z-index:1;">
          Reset<br><em style="color:#E8601A;font-style:italic">Emocional</em>
        </h1>
        <p style="font-size:12px;color:#ffffff;letter-spacing:1.5px;font-family:'Poppins',sans-serif;font-weight:300;margin-bottom:24px;position:relative;z-index:1;">por Kamila Bonatto</p>
        <p style="font-size:13px;color:#ffffff;line-height:1.7;max-width:300px;font-weight:300;margin-bottom:40px;position:relative;z-index:1;">
          Digite a senha que você recebeu para acessar a ferramenta.
        </p>

        <div style="width:100%;max-width:320px;margin-bottom:12px;position:relative;z-index:1;">
          <input
            id="campo-senha"
            type="password"
            placeholder="Sua senha de acesso"
            style="
              width:100%;box-sizing:border-box;
              padding:15px 50px 15px 20px;
              border-radius:14px;
              border:1.5px solid rgba(244,237,224,0.2);
              background:rgba(244,237,224,0.08);
              font-family:'Poppins',sans-serif;
              font-size:14px;color:#ffffff;
              outline:none;transition:border 0.2s;
              backdrop-filter:blur(4px);
            "
            onkeydown="if(event.key==='Enter') tentarAcesso()"
            onfocus="this.style.border='1.5px solid #E8601A'"
            onblur="this.style.border='1.5px solid rgba(244,237,224,0.2)'"
          />
          <span onclick="toggleSenha()" style="position:absolute;right:16px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:18px;user-select:none;color:#ffffff;" id="olho">👁</span>
        </div>

        <button id="btn-acessar" onclick="tentarAcesso()" style="
          width:100%;max-width:320px;padding:15px;
          border-radius:14px;border:none;
          background:linear-gradient(135deg,#F0904A,#E8601A);
          color:#ffffff;font-family:'Poppins',sans-serif;
          font-size:14px;font-weight:500;cursor:pointer;
          letter-spacing:0.5px;
          box-shadow:0 8px 24px rgba(232,96,26,0.3);
          transition:opacity 0.2s;position:relative;z-index:1;
        " onmouseover="this.style.opacity='0.88'" onmouseout="this.style.opacity='1'">Acessar</button>

        <p id="erro-msg" style="font-size:12px;color:#E8601A;margin-top:14px;min-height:18px;font-weight:400;position:relative;z-index:1;"></p>
      </div>
    `;
  });

  window.tentarAcesso = async function () {
    const senha = document.getElementById("campo-senha").value.trim();
    const btn   = document.getElementById("btn-acessar");
    const erro  = document.getElementById("erro-msg");
    const campo = document.getElementById("campo-senha");

    if (!senha) return;

    btn.textContent = "Verificando…";
    btn.disabled = true;

    try {
      let valido = false;

      // Se Apps Script configurado, valida no servidor
      if (!APPS_SCRIPT_URL.startsWith("COLE")) {
        const res  = await fetch(APPS_SCRIPT_URL, {
          method: "POST",
          body: JSON.stringify({ acao: "validarToken", token: senha })
        });
        const json = await res.json();
        valido = json.ok === true;
      }

      if (valido) {
        sessionStorage.setItem("re-auth", "ok");
        sessionStorage.setItem("re-token", senha);
        location.reload();
      } else {
        erro.textContent = "Senha incorreta. Verifique e tente novamente.";
        campo.style.border = "1.5px solid #E8601A";
        btn.textContent = "Acessar";
        btn.disabled = false;
        setTimeout(() => { erro.textContent = ""; campo.style.border = "1.5px solid rgba(244,237,224,0.2)"; }, 3000);
      }
    } catch(_) {
      erro.textContent = "Erro de conexão. Tente novamente.";
      btn.textContent = "Acessar";
      btn.disabled = false;
    }
  };

  window.toggleSenha = function () {
    const campo = document.getElementById("campo-senha");
    const olho  = document.getElementById("olho");
    if (campo.type === "password") { campo.type = "text"; olho.textContent = "🙈"; }
    else { campo.type = "password"; olho.textContent = "👁"; }
  };
})();
</script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --orange: #E8601A;
  --orange-light: #F0904A;
  --orange-pale: #FAE0D0;
  --cafe: #23201A;
  --cream: #F4EDE0;
  --cream-dark: #EAE0CF;
  --green: #4A5E42;
  --green-light: #EBF2E8;
  --green-mid: #C2D9BA;
  --white: #FFFFFF;
}

html, body {
  min-height: 100vh;
  font-family: 'Poppins', sans-serif;
  color: var(--cafe);
  background: #111111;
}

/* ── GRAIN OVERLAY (só na landing) ── */
#screen-landing::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.5;
}

/* ── SCREENS ── */
.screen { display: none; }
.screen.active { display: flex; }

/* ══════════════════════════════
   LANDING SCREEN
══════════════════════════════ */
#screen-landing {
  min-height: 100vh;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
  text-align: center;
  position: relative;
  background: linear-gradient(to right, #0a0a0a 0%, #1a1a1a 30%, #2e2e2e 60%, #4a4040 100%);
}

.landing-badge {
  display: inline-block;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--orange);
  font-family: 'Poppins', sans-serif;
  font-weight: 500;
  margin-bottom: 24px;
  opacity: 0;
  animation: fadeUp 0.6s ease 0.1s forwards;
  position: relative; z-index: 1;
}

.landing-title {
  font-family: 'Lora', serif;
  font-size: clamp(42px, 10vw, 64px);
  font-weight: 400;
  line-height: 1.1;
  color: #ffffff;
  max-width: 500px;
  margin-bottom: 24px;
  opacity: 0;
  animation: fadeUp 0.7s ease 0.25s forwards;
  position: relative; z-index: 1;
}
.landing-title em { color: var(--orange); font-style: italic; display: block; }

.landing-desc {
  font-size: 15px;
  color: #ffffff;
  line-height: 1.7;
  max-width: 360px;
  margin: 0 auto 44px;
  font-weight: 300;
  opacity: 0;
  animation: fadeUp 0.7s ease 0.4s forwards;
  position: relative; z-index: 1;
}

.landing-btn {
  display: inline-block;
  background: linear-gradient(135deg, #F0904A, #E8601A);
  color: #ffffff;
  border: none;
  border-radius: 100px;
  padding: 18px 52px;
  font-size: 15px;
  font-family: 'Poppins', sans-serif;
  font-weight: 500;
  cursor: pointer;
  letter-spacing: 0.5px;
  opacity: 0;
  animation: fadeUp 0.7s ease 0.55s forwards;
  transition: transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 8px 28px rgba(232,96,26,0.3);
  position: relative; z-index: 1;
  margin-bottom: 14px;
}
.landing-btn:hover { transform: translateY(-2px); box-shadow: 0 14px 36px rgba(232,96,26,0.45); }

.landing-btn-week {
  display: inline-block;
  font-size: 12px;
  font-family: 'Poppins', sans-serif;
  color: var(--orange);
  background: transparent;
  border: 1.5px solid var(--orange);
  border-radius: 100px;
  padding: 8px 22px;
  cursor: pointer;
  letter-spacing: 0.5px;
  opacity: 0;
  animation: fadeUp 0.7s ease 0.65s forwards;
  transition: all 0.2s;
  position: relative; z-index: 1;
}
.landing-btn-week:hover { background: var(--orange); color: #fff; }

.landing-footer {
  position: absolute;
  bottom: 24px;
  font-size: 11px;
  color: #ffffff;
  letter-spacing: 2px;
  font-family: 'Poppins', sans-serif;
  opacity: 0;
  animation: fadeUp 0.7s ease 0.7s forwards;
  z-index: 1;
}

/* decorative rings */
.landing-lines { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
.landing-lines span { position: absolute; border-radius: 50%; border: 1px solid rgba(232,96,26,0.07); }
.landing-lines span:nth-child(1) { width: 500px; height: 500px; top: -150px; right: -150px; }
.landing-lines span:nth-child(2) { width: 300px; height: 300px; bottom: -80px; left: -80px; }
.landing-lines span:nth-child(3) { width: 200px; height: 200px; bottom: 100px; right: 80px; }

/* ══════════════════════════════
   DIARY SCREEN
══════════════════════════════ */
#screen-diary {
  min-height: 100vh;
  flex-direction: column;
  align-items: center;
  padding: 0 16px 80px;
  background: #111111;
}

/* STICKY NAV TABS */
.diary-top-nav {
  width: 100%;
  max-width: 500px;
  display: flex;
  justify-content: center;
  background: #1a1a1a;
  position: sticky;
  top: 0;
  z-index: 20;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}

.nav-tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 12px 0 14px;
  cursor: pointer;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  font-family: 'Poppins', sans-serif;
  font-size: 10px;
  font-weight: 500;
  color: rgba(255,255,255,0.3);
  letter-spacing: 0.3px;
}
.nav-tab .tab-icon { font-size: 18px; line-height: 1; }
.nav-tab.active { color: var(--orange); border-bottom-color: var(--orange); }
.nav-tab.active-green { color: var(--green); border-bottom-color: var(--green); }

.diary-subheader {
  width: 100%;
  max-width: 500px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 0 6px;
}

.diary-brand {
  font-family: 'Lora', serif;
  font-size: 14px;
  font-weight: 600;
  color: #ffffff;
}
.diary-brand em { color: var(--orange); font-style: italic; }

.diary-date-lbl {
  font-size: 10px;
  color: rgba(255,255,255,0.4);
  font-family: 'Poppins', sans-serif;
  letter-spacing: 0.5px;
}

.progress-bar {
  width: 100%;
  max-width: 500px;
  height: 3px;
  background: rgba(255,255,255,0.1);
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 18px;
}
.progress-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.4s ease, background 0.3s ease;
  width: 0%;
}

/* CARD */
.card {
  width: 100%;
  max-width: 500px;
  background: #1e1e1e;
  border-radius: 20px;
  box-shadow: 0 8px 48px rgba(0,0,0,0.5);
  overflow: hidden;
  animation: cardIn 0.35s ease;
  border: 1px solid rgba(255,255,255,0.07);
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.card-body { padding: 32px; }

.step-dot {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  color: #fff; margin-bottom: 16px;
  font-family: 'Poppins', sans-serif;
}

.card-title {
  font-family: 'Lora', serif;
  font-size: 22px;
  font-weight: 400;
  line-height: 1.35;
  color: #ffffff;
  margin-bottom: 8px;
}

.card-sub {
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  line-height: 1.6;
  margin-bottom: 20px;
  font-weight: 300;
}

textarea {
  width: 100%;
  background: #2a2a2a;
  border: 1.5px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 15px 17px;
  font-size: 14px;
  color: #ffffff;
  font-family: 'Poppins', sans-serif;

  min-height: 100px;
  outline: none;
  line-height: 1.7;
  margin-bottom: 20px;
  font-weight: 300;
  transition: border-color 0.2s;
}
textarea:focus { border-color: var(--orange); }
textarea::placeholder { color: rgba(255,255,255,0.25); }

/* EMOTION GRID */
.emotion-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 20px;
}

.emotion-btn {
  background: #2a2a2a;
  border: 2px solid transparent;
  border-radius: 14px;
  padding: 14px 10px;
  cursor: pointer;
  font-size: 12px;
  font-family: 'Poppins', sans-serif;
  color: #ffffff;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  transition: all 0.15s;
  line-height: 1.2;
  text-align: center;
  font-weight: 400;
}
.emotion-btn .em-icon { font-size: 22px; }
.emotion-btn:hover { border-color: var(--orange-light); background: #333333; }
.emotion-btn.selected-challenging { background: var(--orange); color: #fff; border-color: var(--orange); }
.emotion-btn.selected-positive { background: var(--green); color: #fff; border-color: var(--green); }

/* TONE BUTTONS */
.tone-btn {
  width: 100%;
  border-radius: 16px;
  padding: 20px 22px;
  cursor: pointer;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 16px;
  border: 2px solid;
  margin-bottom: 12px;
  transition: all 0.2s;
  background: #2a2a2a;
  font-family: 'Poppins', sans-serif;
}
.tone-icon { font-size: 28px; flex-shrink: 0; }
.tone-label { font-weight: 600; font-size: 14px; margin-bottom: 3px; }
.tone-desc { font-size: 12px; opacity: 0.55; font-weight: 300; color: #ffffff; }

/* NEED CARD — fundo preto para destaque */
.need-card {
  border-radius: 14px;
  padding: 18px 20px;
  margin-bottom: 20px;
  display: flex;
  align-items: flex-start;
  gap: 14px;

}
.need-icon { font-size: 24px; margin-top: 2px; }
.need-label { font-weight: 600; font-size: 15px; margin-bottom: 4px; color: #ffffff !important; }
.need-sub { font-size: 12px; opacity: 0.75; font-weight: 300; color: #ffffff !important; }

/* ACTION BUTTONS */
.action-btn {
  width: 100%;
  background: #2a2a2a;
  border: 2px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 14px 16px;
  cursor: pointer;
  font-size: 13px;
  font-family: 'Poppins', sans-serif;
  color: #ffffff;
  text-align: left;
  margin-bottom: 8px;
  transition: all 0.15s;
  font-weight: 300;
  line-height: 1.4;
}
.action-btn:hover { border-color: var(--orange-light); background: #333333; }
.action-btn.selected-challenging { background: var(--orange); color: #fff; border-color: var(--orange); }
.action-btn.selected-positive { background: var(--green); color: #fff; border-color: var(--green); }

/* NAV ROWS */
.nav-row { display: flex; gap: 10px; margin-top: 4px; }

.btn-back {
  flex: 1;
  background: transparent;
  border: 2px solid rgba(255,255,255,0.12);
  border-radius: 12px;
  padding: 13px;
  font-size: 13px;
  cursor: pointer;
  color: rgba(255,255,255,0.5);
  font-family: 'Poppins', sans-serif;

}

  font-weight: 500;

}

.btn-next:not(:disabled):hover { transform: translateY(-1px); }

.btn-finish {
  width: 100%;
  border: none;
  border-radius: 12px;
  padding: 16px;
  font-size: 15px;
  cursor: pointer;
  color: #fff;
  font-family: 'Poppins', sans-serif;
  font-weight: 500;
  transition: opacity 0.2s, transform 0.15s;
  margin-top: 4px;
}
.btn-finish:hover { transform: translateY(-1px); }

/* COMPLETE */
.complete-icon { font-size: 52px; margin-bottom: 16px; display: block; text-align: center; }
.complete-title {
  font-family: 'Lora', serif;
  font-size: 22px;
  font-weight: 400;
  text-align: center;
  margin-bottom: 10px;
}
.complete-text { font-size: 14px; color: rgba(255,255,255,0.55); line-height: 1.7; text-align: center; margin-bottom: 28px; font-weight: 300; }

.summary-box { border-radius: 14px; padding: 20px; margin-bottom: 24px; background: #2a2a2a !important; border: 1px solid rgba(255,255,255,0.07); }
.summary-label { font-size: 10px; color: rgba(255,255,255,0.35); letter-spacing: 2px; text-transform: uppercase; font-family: 'Poppins', sans-serif; margin-bottom: 12px; }
.summary-row { font-size: 13px; color: #ffffff; margin-bottom: 6px; line-height: 1.5; }
.summary-row strong { font-weight: 600; color: rgba(255,255,255,0.7); }

.btn-restart {
  width: 100%;
  background: transparent;
  border-radius: 12px;
  padding: 14px;
  font-size: 13px;
  cursor: pointer;
  font-family: 'Poppins', sans-serif;
  border: 2px solid;
  transition: all 0.15s;
  margin-bottom: 10px;
  color: inherit;
}
.btn-restart:hover { opacity: 0.75; }

/* ══════════════════════════════
   WEEK / HISTORY SCREEN
══════════════════════════════ */
#screen-week {
  min-height: 100vh;
  flex-direction: column;
  align-items: center;
  padding: 0 16px 80px;
  background: #111111;
}

.week-header {
  width: 100%;
  max-width: 500px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 0 16px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  margin-bottom: 20px;
  position: sticky;
  top: 0;
  background: #111111;
  z-index: 10;
}

.week-title {
  font-family: 'Lora', serif;
  font-size: 22px;
  font-weight: 400;
  color: #ffffff;
}
.week-title em { color: var(--orange); font-style: italic; }

.btn-week-back {
  font-size: 12px;
  font-family: 'Poppins', sans-serif;
  color: var(--orange);
  background: transparent;
  border: 1.5px solid var(--orange);
  border-radius: 100px;
  padding: 6px 16px;
  cursor: pointer;
  transition: all 0.2s;

// ── HISTÓRICO ──────────────────────────────────────────
const HISTORY_KEY_PREFIX = 're-history-';

function historyKey() {
  const token = sessionStorage.getItem('re-token') || 'default';
  return HISTORY_KEY_PREFIX + token;
}
function loadHistory() {
  try { return JSON.parse(localStorage.getItem(historyKey()) || '[]'); }
  catch { return []; }
}
function saveHistory(entries) { localStorage.setItem(historyKey(), JSON.stringify(entries)); }
function addToHistory(entry) {
  const entries = loadHistory();
  entries.unshift(entry);
  saveHistory(entries.slice(0, 14));
}
function saveRating(index, rating) {

// Calcula scores do diagnóstico e retorna top-2 necessidades
function calcDiagNeed() {
  const scores = {};
  const isPos = state.mode === 'positive';
  DIAG_GROUPS.forEach(g => {
    let pts = 0;
    g.perguntas.forEach((q, qi) => {
      const resp = state.diagRespostas[g.key + '_' + qi];
      if (resp === undefined) return;
      if (isPos) {
        // modo positivo: "sim" indica necessidade bem suprida
        if (q.pontoNao && resp === 'sim') pts++;
      } else {
        // modo challenging: "não" indica necessidade carente
        if (q.pontoNao && resp === 'nao') pts++;
      }
    });
    scores[g.key] = pts;
  });
  const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]);
  const top1 = sorted[0][1] > 0 ? sorted[0][0] : null;
  const top2 = (sorted[1] && sorted[1][1] > 0 && sorted[1][1] === sorted[0][1]) ? sorted[1][0] : null;
  return { primary: top1, secondary: top2 };
}

}
function needKey2() {
  // Segunda necessidade (apenas do diagnóstico)
  if (state.diagNeed && state.diagNeed.secondary) return state.diagNeed.secondary;
  return null;
}
function needsRefinement() {
  const em = getEmotionData();
  return em && em.refine && !state.refinedNeed;
}
function orange() { return '#E8601A'; }
function green()  { return '#4A5E42'; }
function accent() { return state.mode === 'positive' ? green() : orange(); }

// ── TABS ──────────────────────────────────────────────
function setTab(tab) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active','active-green'));
  if (tab === 'inicio') {
    document.getElementById('tab-inicio').classList.add('active');
  } else if (tab === 'diario') {
    const cls = state.mode === 'positive' ? 'active-green' : 'active';
    document.getElementById('tab-diario').classList.add(cls);
  }
}

function goToLanding() {
  document.getElementById('screen-diary').classList.remove('active');
  document.getElementById('screen-landing').classList.add('active');
  state = { step: 0, mode: null, emotion: null, refinedNeed: null, eventText: '', bodyText: '', celebrateText: '', action: null, customAction: '', diagRespostas: {}, diagNeed: null };
}

// ── INIT ──────────────────────────────────────────────
function startDiary() {
  document.getElementById('screen-landing').classList.remove('active');
  document.getElementById('screen-diary').classList.add('active');
  document.getElementById('diary-date').textContent = new Date().toLocaleDateString('pt-BR');
  setTab('inicio');
  render();
}

function render() {
  updateProgress();
  const c = document.getElementById('card-content');
  c.innerHTML = '';
  const s = state.step;
  if      (s === 0)   renderTone(c);
  else if (s === 1)   renderEvent(c);
  else if (s === 2)   renderBody(c);
  else if (s === 3)   renderEmotion(c);
  else if (s === 3.5) renderRefine(c);
  else if (s === 3.8) renderDiagIntro(c);
  else if (s === 4.1) renderDiagGroup(c, 0);
  else if (s === 4.2) renderDiagGroup(c, 1);
  else if (s === 4.3) renderDiagGroup(c, 2);
  else if (s === 4.4) renderDiagGroup(c, 3);
  else if (s === 4.5) renderDiagGroup(c, 4);
  else if (s === 5)   renderNeed(c);
  else if (s === 6)   renderAction(c);
  else                renderComplete(c);

  const card = document.getElementById('diary-card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'cardIn 0.35s ease';

  if (s === 0) setTab('inicio');
  else setTab('diario');
}

function updateProgress() {
  const fill = document.getElementById('progress-fill');
  // mapeamos os steps para 0–100%
  const stepMap = { 0:0, 1:10, 2:20, 3:30, 3.5:35, 3.8:40, 4.1:48, 4.2:56, 4.3:62, 4.4:68, 4.5:74, 5:82, 6:90, 7:100 };
  const pct = stepMap[state.step] !== undefined ? stepMap[state.step] : 100;
  fill.style.width = pct + '%';
  fill.style.background = state.mode === 'positive' ? green() : orange();
}

// ── STEP RENDERERS ────────────────────────────────────
function renderTone(c) {
  c.innerHTML = `
    <p style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--orange);font-family:'Poppins',sans-serif;margin-bottom:8px;font-weight:500">Como estou hoje?</p>
    <h2 class="card-title">De modo geral, como está sendo esse momento?</h2>
    <p class="card-sub" style="margin-bottom:28px">Escolha o tom do seu registro de hoje.</p>
    <button class="tone-btn" style="border-color:var(--green-mid);color:var(--green)" onclick="setMode('positive')">
      <span class="tone-icon">🌱</span>
      <div>
        <div class="tone-label" style="color:var(--green)">Estou bem — quero celebrar isso</div>
        <div class="tone-desc">Uma necessidade foi suprida e quero reconhecer</div>
      </div>
    </button>
    <button class="tone-btn" style="border-color:#F5A96E;color:var(--orange)" onclick="setMode('challenging')">
      <span class="tone-icon">🌊</span>
      <div>
        <div class="tone-label" style="color:var(--orange)">Estou sentindo algo difícil</div>
        <div class="tone-desc">Uma necessidade não foi atendida e quero entender</div>
      </div>
    </button>
  `;
}

function setMode(m) {
  state.mode = m;
  state.step = 1;
  render();
}

function renderEvent(c) {
  const isPos = state.mode === 'positive';
  c.innerHTML = `
    ${dot(1)}
    <h2 class="card-title">O que aconteceu?</h2>
    <p class="card-sub">${isPos ? 'Descreva o momento ou situação que gerou esse sentimento bom.' : 'Descreva o momento que gerou esse sentimento.'}</p>
    <textarea id="ta-event" placeholder="${isPos ? 'Ex: Terminei um projeto importante, recebi um elogio, me conectei com alguém…' : 'Ex: Tive uma discussão, recebi uma notícia, fiquei sozinha…'}">${state.eventText}</textarea>
    ${navRow(0, 2, false)}
  `;
  document.getElementById('ta-event').addEventListener('input', e => state.eventText = e.target.value);
}

function renderBody(c) {
  const isPos = state.mode === 'positive';
  c.innerHTML = `
    ${dot(2)}
    <h2 class="card-title">O que sinto no meu corpo?</h2>
    <p class="card-sub">${isPos ? 'Leveza? Calor no peito? Energia? Relaxamento?' : 'Aperto no peito? Cansaço? Agitação? Vazio?'}</p>
    <textarea id="ta-body" placeholder="${isPos ? 'Ex: Sinto leveza, meus ombros estão relaxados, tenho energia…' : 'Ex: Sinto um nó no estômago, meus ombros estão tensos…'}">${state.bodyText}</textarea>
    ${navRow(1, 3, false)}
  `;
  document.getElementById('ta-body').addEventListener('input', e => state.bodyText = e.target.value);
}

function renderEmotion(c) {
  const list = EMOTIONS[state.mode];
  const grid = list.map(em => `
    <button class="emotion-btn ${state.emotion === em.name ? 'selected-'+state.mode : ''}"
      onclick="selectEmotion('${em.name.replace(/'/g,"\\'")}')">
      <span class="em-icon">${em.icon}</span>
      ${em.name}
    </button>
  `).join('');

  c.innerHTML = `
    ${dot(3)}
    <h2 class="card-title">Se eu tivesse que dar um nome a isso…</h2>
    <p class="card-sub">Eu estou me sentindo:</p>
    <div class="emotion-grid">${grid}</div>
    ${navRow(2, 'next-emotion', !state.emotion)}
  `;

  const nextBtn = c.querySelector('.btn-next');
  if (nextBtn) nextBtn.onclick = () => advanceFromEmotion();
}

function selectEmotion(name) {
  state.emotion = name;
  state.refinedNeed = null;
  const c = document.getElementById('card-content');
  c.querySelectorAll('.emotion-btn').forEach(btn => btn.classList.remove('selected-positive','selected-challenging'));
  event.currentTarget.classList.add('selected-' + state.mode);
  const nextBtn = c.querySelector('.btn-next');
  if (nextBtn) { nextBtn.disabled = false; nextBtn.onclick = () => advanceFromEmotion(); }
}

function advanceFromEmotion() {
  if (needsRefinement()) {
    state.step = 3.5;
  } else {
    state.step = 3.8;
  }
  render();
}

function renderRefine(c) {
  const em = getEmotionData();
  const r = em.refine;
  const optBtns = r.options.map(opt => `
    <button class="tone-btn refine-opt ${state.refinedNeed === opt.need ? 'refine-selected' : ''}"
      style="border-color:${state.refinedNeed === opt.need ? accent() : '#E0DDD6'};background:${state.refinedNeed === opt.need ? (state.mode==='positive'?'#EBF2E8':'#FAE0D0') : 'transparent'}"
      onclick="selectRefinement('${opt.need}')">
      <span class="tone-icon" style="font-size:20px">${NEEDS[opt.need].icon}</span>
      <div>
        <div class="tone-label" style="color:${accent()};font-size:14px">${opt.label}</div>
      </div>
    </button>
  `).join('');

  c.innerHTML = `
    ${dot(3)}
    <p style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:${accent()};font-family:'Poppins',sans-serif;font-weight:500;margin-bottom:8px">Refinando: ${em.name}</p>
    <h2 class="card-title">${r.question}</h2>
    <p class="card-sub" style="margin-bottom:24px;font-style:italic">${r.reflection}</p>
    ${optBtns}
    <div class="nav-row" style="margin-top:16px">
      <button class="btn-back" onclick="goTo(3)">← Voltar</button>
      <button class="btn-next" style="background:${accent()}" ${!state.refinedNeed ? 'disabled' : ''} onclick="goTo(3.8)">Continuar →</button>
    </div>
  `;
}

function selectRefinement(need) {
  state.refinedNeed = need;
  const c = document.getElementById('card-content');
  const ac = accent();
  const bgSelected = state.mode === 'positive' ? '#EBF2E8' : '#FAE0D0';
  c.querySelectorAll('.refine-opt').forEach(btn => { btn.style.borderColor = '#E0DDD6'; btn.style.background = 'transparent'; });
  event.currentTarget.style.borderColor = ac;
  event.currentTarget.style.background = bgSelected;
  const nextBtn = c.querySelector('.btn-next');
  if (nextBtn) nextBtn.disabled = false;
}

// ── DIAGNÓSTICO — tela de introdução ──────────────────
function renderDiagIntro(c) {
  const prevStep = needsRefinement() ? 3.5 : 3;
  c.innerHTML = `
    <div style="text-align:center;padding:8px 0 16px">
      <span style="font-size:44px;display:block;margin-bottom:18px">🔍</span>
      <p style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:${accent()};font-family:'Poppins',sans-serif;font-weight:500;margin-bottom:12px">Diagnóstico emocional</p>
      <h2 class="card-title" style="text-align:center;font-size:20px">Agora vamos mapear o que essa emoção está revelando sobre você</h2>
      <p class="card-sub" style="text-align:center;margin-top:10px;margin-bottom:28px">Responda com honestidade — não existe certo ou errado aqui. São <strong style="color:rgba(255,255,255,0.75)">5 blocos rápidos</strong> de perguntas e, ao final, você vai entender com mais clareza qual necessidade está em foco.</p>
    </div>
    <div class="nav-row">
      <button class="btn-back" onclick="goTo(${prevStep})">← Voltar</button>
      <button class="btn-next" style="background:${accent()}" onclick="goTo(4.1)">Começar →</button>
    </div>
  `;
}

// ── DIAGNÓSTICO — telas de grupo (0–4) ────────────────
const DIAG_STEPS = [4.1, 4.2, 4.3, 4.4, 4.5];

function renderDiagGroup(c, groupIdx) {
  const g = DIAG_GROUPS[groupIdx];
  const totalGroups = DIAG_GROUPS.length;
  const nextStep = groupIdx < totalGroups - 1 ? DIAG_STEPS[groupIdx + 1] : 5;
  const prevStep = groupIdx === 0 ? 3.8 : DIAG_STEPS[groupIdx - 1];

  const perguntas = g.perguntas.map((q, qi) => {
    const key = g.key + '_' + qi;
    const resp = state.diagRespostas[key];

    if (q.especial) {
      return `
        <div class="diag-q-wrap">
          <p class="diag-q-text">${q.texto}</p>
          <div class="diag-btn-row">
            <button class="diag-opt ${resp==='energia' ? 'diag-sel-pos' : ''}"
              onclick="setDiag('${key}','energia',this)">Me dão energia</button>
            <button class="diag-opt ${resp==='esgota' ? 'diag-sel-neg' : ''}"
              onclick="setDiag('${key}','esgota',this)">Me esgotam</button>
          </div>
        </div>`;
    }
    return `
      <div class="diag-q-wrap">
        <p class="diag-q-text">${q.texto}</p>
        <div class="diag-btn-row">
          <button class="diag-opt ${resp==='sim' ? 'diag-sel-pos' : ''}"
            onclick="setDiag('${key}','sim',this)">Sim</button>
          <button class="diag-opt ${resp==='nao' ? 'diag-sel-neg' : ''}"
            onclick="setDiag('${key}','nao',this)">Não</button>
        </div>
      </div>`;
  }).join('');

  // checa se todas respondidas
  const allAnswered = g.perguntas.every((q, qi) => state.diagRespostas[g.key + '_' + qi] !== undefined);

  c.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
      <p style="font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:${accent()};font-family:'Poppins',sans-serif;font-weight:500">${g.icon} ${g.label}</p>
      <p style="font-size:10px;color:rgba(255,255,255,0.3);font-family:'Poppins',sans-serif">Bloco ${groupIdx+1} de ${totalGroups}</p>
    </div>
    <div style="height:3px;background:rgba(255,255,255,0.07);border-radius:4px;margin-bottom:22px;overflow:hidden">
      <div style="height:100%;width:${((groupIdx+1)/totalGroups)*100}%;background:${accent()};border-radius:4px;transition:width 0.4s"></div>
    </div>
    ${perguntas}
    <div class="nav-row" style="margin-top:8px" id="diag-nav-${groupIdx}">
      <button class="btn-back" onclick="goTo(${prevStep})">← Voltar</button>
      <button class="btn-next" id="diag-next-${groupIdx}" style="background:${accent()}" ${!allAnswered ? 'disabled' : ''} onclick="advanceDiag(${groupIdx}, ${nextStep})">
        ${groupIdx < totalGroups-1 ? 'Próximo bloco →' : 'Ver resultado →'}
      </button>
    </div>
  `;
}

function setDiag(key, val, btn) {
  state.diagRespostas[key] = val;
  // atualiza visuais sem re-render
  const row = btn.closest('.diag-btn-row');
  row.querySelectorAll('.diag-opt').forEach(b => b.classList.remove('diag-sel-pos','diag-sel-neg'));
  if (val === 'sim' || val === 'energia') btn.classList.add('diag-sel-pos');
  else btn.classList.add('diag-sel-neg');
  // verifica se todas do grupo foram respondidas para habilitar o botão
  const groupIdx = parseInt(btn.closest('.card-body').querySelector('[id^="diag-next-"]').id.split('-')[2]);
  const g = DIAG_GROUPS[groupIdx];
  const allAnswered = g.perguntas.every((q, qi) => state.diagRespostas[g.key + '_' + qi] !== undefined);
  const nextBtn = document.getElementById('diag-next-' + groupIdx);
  if (nextBtn) nextBtn.disabled = !allAnswered;
}

function advanceDiag(groupIdx, nextStep) {
  // se é o último grupo, calcula o resultado
  if (groupIdx === DIAG_GROUPS.length - 1) {
    state.diagNeed = calcDiagNeed();
  }
  state.step = nextStep;
  render();
}

function renderNeed(c) {
  const nk = needKey();
  const nk2 = needKey2();
  const n = NEEDS[nk];
  const isPos = state.mode === 'positive';
  const variant = isPos ? n.positive : n.challenging;

  const celebrateField = isPos ? `
    <p class="card-sub" style="margin-bottom:8px">O que tornou isso possível?</p>
    <textarea id="ta-celebrate" placeholder="Ex: Eu me dediquei, confiei em mim, pedi ajuda, mantive minha rotina…">${state.celebrateText}</textarea>
  ` : '';

  // Segunda necessidade — funciona tanto em positivo quanto em challenging
  let secondNeedHtml = '';
  if (nk2 && NEEDS[nk2]) {
    const n2 = NEEDS[nk2];
    const variant2 = isPos ? n2.positive : n2.challenging;
    const label2 = isPos ? 'Segunda necessidade em destaque' : 'Sua segunda maior necessidade hoje';
    secondNeedHtml = `
      <p class="card-sub" style="margin-top:6px;margin-bottom:8px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.4)">${label2}</p>
      <div class="need-card" style="opacity:0.8">
        <span class="need-icon">${n2.icon}</span>
        <div>
          <div class="need-label">${variant2.label}</div>
          <div class="need-sub">${variant2.sub}</div>
        </div>
      </div>`;
  }

  const firstLabel = isPos
    ? `<p class="card-sub" style="margin-bottom:8px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.4)">Necessidade mais suprida agora ✨</p>`
    : `<p class="card-sub" style="margin-bottom:8px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.4)">Sua maior necessidade atual</p>`;

  c.innerHTML = `
    ${dot(4)}
    <h2 class="card-title">${isPos ? 'O que essa emoção está celebrando?' : 'O que essa emoção está pedindo?'}</h2>
    ${firstLabel}
    <div class="need-card">
      <span class="need-icon">${n.icon}</span>
      <div>
        <div class="need-label">${variant.label}</div>
        <div class="need-sub">${variant.sub}</div>
      </div>
    </div>
    ${secondNeedHtml}
    ${celebrateField}
    ${navRow(4.5, 6, false)}
  `;
  if (isPos) {
    document.getElementById('ta-celebrate').addEventListener('input', e => state.celebrateText = e.target.value);
  }
}

// Monta badge de avaliação da comunidade para uma ação
function badgeComunidade(nk, textoAcao) {
  const dados = rankingComunidade[nk] || [];
  const item  = dados.find(d => d.acao === textoAcao);
  if (!item || item.vezes < 2) return '';
  const estrelas = '⭐'.repeat(Math.round(item.media));
  return `<span style="
    display:inline-block;margin-top:6px;
    font-size:11px;color:rgba(255,255,255,0.55);
    font-family:'Poppins',sans-serif;font-weight:300;
  ">${estrelas} ${item.media.toFixed(1)} · escolhida ${item.vezes}x pela comunidade</span>`;
}

function renderAction(c) {
  const nk = needKey();
  const nk2 = needKey2();
  const list = ACTIONS[state.mode][nk] || [];
  const isPos = state.mode === 'positive';

  // Carrega ranking da comunidade em background e re-renderiza quando chegar
  if (!rankingComunidade[nk]) {
    carregarRanking(nk).then(() => {
      const currentC = document.getElementById('card-content');
      if (currentC && state.step === 6) renderAction(currentC);
    });
  }
  if (nk2 && !rankingComunidade[nk2]) {
    carregarRanking(nk2).then(() => {
      const currentC = document.getElementById('card-content');
      if (currentC && state.step === 6) renderAction(currentC);
    });
  }

  const btns = list.map(a => `
    <button class="action-btn ${state.action === a ? 'selected-'+state.mode : ''}"
      onclick="selectAction('${a.replace(/'/g,"\\'")}')">
      ${a}
      ${badgeComunidade(nk, a)}
    </button>
  `).join('');

  // Sugestões para segunda necessidade (ambos os modos)
  let secondActionsHtml = '';
  if (nk2 && ACTIONS[state.mode][nk2]) {
    const list2 = ACTIONS[state.mode][nk2];
    const n2 = NEEDS[nk2];
    const btns2 = list2.map(a => `
      <button class="action-btn ${state.action === a ? 'selected-'+state.mode : ''}"
        onclick="selectAction('${a.replace(/'/g,"\\'")}')">
        ${a}
        ${badgeComunidade(nk2, a)}
      </button>
    `).join('');
    const label2 = isPos ? `${n2.icon} Para celebrar ${nk2}` : `${n2.icon} Para ${nk2}`;
    secondActionsHtml = `
      <p class="card-sub" style="margin-top:18px;margin-bottom:8px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.4)">${label2}</p>
      ${btns2}
    `;
  }

  c.innerHTML = `
    ${dot(5)}
    <h2 class="card-title">O que posso fazer hoje por mim?</h2>
    <p class="card-sub">${isPos
      ? 'Uma ação pequena para honrar e prolongar esse momento.'
      : 'Uma ação pequena e concreta que cuida dessa necessidade.'
    }</p>
    ${btns}
    ${secondActionsHtml}
    <p class="card-sub" style="margin-top:14px;margin-bottom:6px">Ou escreva a sua:</p>
    <textarea id="ta-action" placeholder="Hoje eu vou…" style="min-height:60px">${state.customAction}</textarea>
    <button class="btn-finish" style="background:${accent()};margin-top:4px" onclick="finish()">
      ${isPos ? 'Celebrar esse momento ✨' : 'Registrar e cuidar de mim →'}
    </button>
    <div class="nav-row" style="margin-top:10px">
      <button class="btn-back" onclick="goTo(5)">← Voltar</button>
    </div>
  `;

  document.getElementById('ta-action').addEventListener('input', e => {
    state.customAction = e.target.value;
    if (e.target.value) {
      state.action = null;
      c.querySelectorAll('.action-btn').forEach(btn => btn.classList.remove('selected-positive','selected-challenging'));
    }
  });
}

function selectAction(a) {
  state.action = a;
  state.customAction = '';
  const c = document.getElementById('card-content');
  c.querySelectorAll('.action-btn').forEach(btn => btn.classList.remove('selected-positive','selected-challenging'));
  event.currentTarget.classList.add('selected-' + state.mode);
  const ta = document.getElementById('ta-action');
  if (ta) ta.value = '';
}

function finish() {
  const nk = needKey();
  const emData = getEmotionData();
  const finalAction = state.action || state.customAction || null;
  const entry = {
    date: new Date().toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: 'long' }),
    timestamp: Date.now(),
    mode: state.mode,
    emotion: state.emotion,
    emotionIcon: emData ? emData.icon : '',
    need: nk,
    action: finalAction,
    eventText: state.eventText,
    bodyText: state.bodyText,
    celebrateText: state.celebrateText,
    rating: null,
    registroId: gerarId()
  };
  addToHistory(entry);

  // Envia dados anônimos para a comunidade (sem identificar a pessoa)
  if (!APPS_SCRIPT_URL.startsWith("COLE") && finalAction) {
    const token = sessionStorage.getItem("re-token") || "";
    fetch(APPS_SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({
        acao:          "salvarRegistro",
        token,
        registroId:    entry.registroId,
        modo:          state.mode,
        emocao:        state.emotion,
        necessidade1:  nk,
        necessidade2:  state.diagNeed ? state.diagNeed.secondary : null,
        acao_escolhida: finalAction,
        estrelas:      null
      })
    }).catch(() => {});
  }
  state.step = 7;
  render();
}

function renderComplete(c) {
  const isPos = state.mode === 'positive';
  const finalAction = state.action || state.customAction || '—';
  const nk = needKey();
  const nk2 = needKey2();
  const bg = isPos ? '#EBF2E8' : '#FAE0D0';

  const secondNeedLine = (!isPos && nk2)
    ? `<p class="summary-row"><strong>2ª necessidade:</strong> ${nk2}</p>`
    : '';

  c.innerHTML = `
    <span class="complete-icon">${isPos ? '🌟' : '🌱'}</span>
    <h2 class="complete-title" style="color:${accent()}">${isPos ? 'Que bom que você parou para celebrar!' : 'Obrigada por cuidar de você.'}</h2>
    <p class="complete-text">${isPos
      ? 'Reconhecer o que está bem é tão importante quanto entender o que dói. Você merece esse momento.'
      : 'Você deu nome ao que sente e escolheu uma ação de cuidado. Isso já é muito.'
    }</p>
    <div class="summary-box" style="background:${bg}">
      <p class="summary-label">Seu registro</p>
      <p class="summary-row"><strong>Emoção:</strong> ${state.emotion}</p>
      <p class="summary-row"><strong>1ª necessidade ${isPos?'suprida':'identificada'}:</strong> ${nk}</p>
      ${secondNeedLine}
      <p class="summary-row" style="margin:0"><strong>Hoje eu vou:</strong> ${finalAction}</p>
    </div>
${(() => {
    const entries = loadHistory();
    const ultimo = entries.length ? entries[0] : null;
    const bloqueado = ultimo && ultimo.action && (ultimo.rating === null || ultimo.rating === undefined);
    if (bloqueado) {
      return `<div style="background:rgba(232,96,26,0.1);border:1.5px solid rgba(232,96,26,0.3);border-radius:14px;padding:16px 18px;margin-bottom:12px;text-align:center">
        <p style="font-size:13px;color:#E8601A;font-family:'Poppins',sans-serif;font-weight:500;margin-bottom:4px">Avalie sua ação primeiro ⭐</p>
        <p style="font-size:12px;color:rgba(255,255,255,0.5);font-family:'Poppins',sans-serif;font-weight:300">Vá em Minha semana e dê uma nota antes de fazer um novo registro.</p>
      </div>
      <button class="btn-restart" style="border-color:rgba(255,255,255,0.15);color:rgba(255,255,255,0.25);cursor:not-allowed" disabled>
        Novo registro
      </button>`;
    }
    return `<button class="btn-restart" style="border-color:${accent()};color:${accent()}" onclick="resetDiary()">
      Novo registro
    </button>`;
  })()}
    <button onclick="openWeek()" style="width:100%;background:transparent;border:2px solid rgba(255,255,255,0.12);border-radius:12px;padding:14px;font-size:13px;cursor:pointer;font-family:'Poppins',sans-serif;color:rgba(255,255,255,0.5);transition:all 0.15s" onmouseover="this.style.borderColor='rgba(255,255,255,0.35)'" onmouseout="this.style.borderColor='rgba(255,255,255,0.12)'">
      📅 Ver minha semana
    </button>
  `;
}

// ── WEEK ──────────────────────────────────────────────
function openWeek() {
  document.getElementById('screen-landing').classList.remove('active');
  document.getElementById('screen-diary').classList.remove('active');
  document.getElementById('screen-week').classList.add('active');
  renderWeek();
}

function closeWeek() {
  document.getElementById('screen-week').classList.remove('active');
  const inDiary = state.mode !== null;
  if (inDiary) {
    document.getElementById('screen-diary').classList.add('active');
  } else {
    document.getElementById('screen-landing').classList.add('active');
  }
}

function renderWeek() {
  const container = document.getElementById('week-content');
  const entries = loadHistory();

  if (entries.length === 0) {
    container.innerHTML = `
      <div class="week-empty">
        🌱<br><br>
        Você ainda não tem registros esta semana.<br>
        <span style="font-size:12px">Faça seu primeiro registro e ele aparecerá aqui.</span>
      </div>`;
    return;
  }

  const total = entries.length;
  const positives = entries.filter(e => e.mode === 'positive').length;
  const challenging = total - positives;

  const actionRatings = {};
  entries.forEach(e => {
    if (e.action && e.rating) {
      if (!actionRatings[e.action]) actionRatings[e.action] = { sum: 0, count: 0 };
      actionRatings[e.action].sum += e.rating;
      actionRatings[e.action].count++;
    }
  });
  let bestAction = null, bestAvg = 0;
  Object.entries(actionRatings).forEach(([action, data]) => {
    const avg = data.sum / data.count;
    if (avg > bestAvg) { bestAvg = avg; bestAction = action; }
  });

  const emotionCount = {};
  entries.forEach(e => { if (e.emotion) emotionCount[e.emotion] = (emotionCount[e.emotion] || 0) + 1; });
  const topEmotion = Object.entries(emotionCount).sort((a,b)=>b[1]-a[1])[0];

  let summaryHtml = `
    <div class="week-summary">
      <p class="ws-title">Resumo dos últimos ${total} registro${total > 1 ? 's' : ''}</p>
      <div class="ws-grid">
        <div class="ws-item">
          <div class="ws-label">Momentos difíceis</div>
          <div class="ws-value" style="color:var(--orange)">${challenging} 🌊</div>
        </div>
        <div class="ws-item">
          <div class="ws-label">Momentos celebrados</div>
          <div class="ws-value" style="color:var(--green)">${positives} 🌱</div>
        </div>
      </div>
      ${topEmotion ? `
      <div class="ws-item" style="margin-bottom:10px;background:rgba(255,255,255,0.06);border-radius:12px;padding:12px 14px;">
        <div class="ws-label">Emoção mais frequente</div>
        <div class="ws-value" style="font-size:14px">${topEmotion[0]} · ${topEmotion[1]}x</div>
      </div>` : ''}
      ${bestAction ? `
      <div class="ws-best">
        <div class="ws-best-label">⭐ Ação que mais funcionou</div>
        <div class="ws-best-action">${bestAction}</div>
        <div class="ws-best-sub">Média ${bestAvg.toFixed(1)} estrelas · tente repetir isso!</div>
      </div>` : `
      <div class="ws-best">
        <div class="ws-best-label">⭐ Ação que mais funcionou</div>
        <div class="ws-best-sub" style="margin-top:4px">Avalie suas ações abaixo para ver a que mais funcionou</div>
      </div>`}
    </div>`;

  let cardsHtml = `
    <div style="
      width:100%;max-width:500px;
      margin-bottom:16px;
      padding:16px 20px;
      background:#1e1e1e;
      border-radius:14px;
      border:1px solid rgba(255,255,255,0.07);
    ">
      <p style="font-family:'Lora',serif;font-size:15px;color:#ffffff;font-weight:400;margin-bottom:6px;line-height:1.4;">
        Classifique suas ações ⭐
      </p>
      <p style="font-family:'Poppins',sans-serif;font-size:12px;color:rgba(255,255,255,0.4);font-weight:300;line-height:1.6;">
        Avalie cada ação que você escolheu fazer. Com o tempo, você vai perceber o que realmente funciona pra você — e isso é muito valioso.
      </p>
    </div>
  ` + entries.map((entry, idx) => {
    const modeLabel = entry.mode === 'positive' ? '🌱 Positivo' : '🌊 Desafio';
    const modeBg    = entry.mode === 'positive' ? 'var(--green-light)' : 'var(--orange-pale)';
    const modeColor = entry.mode === 'positive' ? 'var(--green)' : 'var(--orange)';
    const action    = entry.action || '—';

    const starsHtml = [1,2,3,4,5].map(n => `
      <button class="star-btn ${(entry.rating||0) >= n ? 'filled' : ''}"
        onclick="rateEntry(${idx}, ${n})" title="${n} estrela${n>1?'s':''}">⭐</button>
    `).join('');

    const eventSnippet = entry.eventText
      ? `<p class="history-note">"${entry.eventText.substring(0, 80)}${entry.eventText.length > 80 ? '…' : ''}"</p>`
      : '';

    return `
      <div class="history-card" id="hcard-${idx}">
        <div class="history-head">
          <span class="history-date">${entry.date}</span>
          <span class="history-mode-badge" style="background:${modeBg};color:${modeColor}">${modeLabel}</span>
        </div>
        <div class="history-body">
          <div class="history-emotion"><span>${entry.emotionIcon||''}</span> ${entry.emotion||'—'}</div>
          <div class="history-need">Necessidade: ${entry.need||'—'}</div>
          <div class="history-action-row">
            <div style="flex:1;min-width:180px">
              <div class="history-action-label">Ação escolhida</div>
              <div class="history-action-text">${action}</div>
            </div>
            <div>
              <div class="history-action-label" style="text-align:right">Resultado</div>
              <div class="stars-row" id="stars-${idx}">${starsHtml}</div>
              ${entry.rating ? `<p class="rating-saved-msg">${entry.rating}★ salvo</p>` : ''}
            </div>
          </div>
          ${eventSnippet}
        </div>
      </div>`;
  }).join('');

  container.innerHTML = summaryHtml + cardsHtml + `
    <button class="btn-clear-week" onclick="confirmClearHistory()">🗑 Limpar histórico desta semana</button>`;
}

function rateEntry(index, rating) {
  saveRating(index, rating);
  renderWeek();
  if (!APPS_SCRIPT_URL.startsWith("COLE")) {
    const entries = loadHistory();
    const entry = entries[index];
    if (!entry || !entry.action) return;
    const token = sessionStorage.getItem("re-token") || "";
    fetch(APPS_SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({
        acao:           "atualizarEstrelas",
        token,
        registroId:     entry.registroId || null,
        modo:           entry.mode,
        emocao:         entry.emotion,
        necessidade1:   entry.need,
        necessidade2:   entry.need2 || null,
        acao_escolhida: entry.action,
        estrelas:       rating
      })
    }).catch(() => {});
  }
}

function confirmClearHistory() {
  if (confirm('Tem certeza que deseja limpar todo o histórico? Essa ação não pode ser desfeita.')) {
    saveHistory([]); renderWeek();
  }
}

// ── HELPERS ───────────────────────────────────────────
function dot(n) {
  return `<div class="step-dot" style="background:${accent()}">${n}</div>`;
}

function navRow(backStep, nextStep, disabled) {
  const dis = disabled === true ? 'disabled' : '';
  return `
    <div class="nav-row">
      <button class="btn-back" onclick="goTo(${backStep})">← Voltar</button>
      <button class="btn-next" style="background:${accent()}" ${dis} onclick="goTo(${nextStep})">Continuar →</button>
    </div>`;
}

function goTo(s) { state.step = s; render(); }

function resetDiary() {
  state = { step: 0, mode: null, emotion: null, refinedNeed: null, eventText: '', bodyText: '', celebrateText: '', action: null, customAction: '', diagRespostas: {}, diagNeed: null };
  render();
}
</script>
</body>
</html>
